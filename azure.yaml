# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: message-screener
metadata:
    template: azd-init@1.25.2
hooks:
    postprovision:
        shell: pwsh
        run: >-
            if (Test-Path ../../scripts/azd-configure-m365-app.ps1) {
              ../../scripts/azd-configure-m365-app.ps1
            } elseif (Test-Path ./scripts/azd-configure-m365-app.ps1) {
              ./scripts/azd-configure-m365-app.ps1
            } else {
              Write-Warning 'Could not locate scripts/azd-configure-m365-app.ps1 from current working directory. Skipping M365 app registration.'
            }
        continueOnError: true
services:
    messagescreener-api:
        project: src/MessageScreener.Api
        host: containerapp
        language: dotnet
        hooks:
            postdeploy:
                shell: pwsh
                run: >-
                    if (Test-Path ../../scripts/azd-generate-teams-manifest.ps1) {
                      ../../scripts/azd-generate-teams-manifest.ps1
                    } elseif (Test-Path ./scripts/azd-generate-teams-manifest.ps1) {
                      ./scripts/azd-generate-teams-manifest.ps1
                    } else {
                      throw 'Could not locate scripts/azd-generate-teams-manifest.ps1 from current working directory.'
                    }
                continueOnError: false
resources:
    messagescreener-api:
        type: host.containerapp
        port: 8080
